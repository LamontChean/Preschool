<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Little Glory Preschool</title>
  <script type="text/javascript">
    // Handle SPA routing on GitHub Pages
    var path = window.location.pathname;
    var base = '/Preschool';

    // Redirect to home with path as parameter
    if (path.startsWith(base)) {
      var route = path.substring(base.length);
      window.location.href = base + '/?route=' + encodeURIComponent(route);
    } else {
      window.location.href = base + '/';
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
